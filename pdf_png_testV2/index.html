<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>PDF to JPEG V2 Test</title>
    <style>
      :root {
        color-scheme: dark;
      }

      body {
        margin: 0;
        padding: 24px;
        background: #181818;
        color: #fffaf0;
        font-family:
          "Microsoft YaHei",
          "PingFang SC",
          system-ui,
          sans-serif;
      }

      h1 {
        margin: 0 0 18px;
        font-size: 30px;
      }

      button,
      input,
      select {
        font: inherit;
      }

      button {
        min-height: 38px;
        border: 0;
        border-radius: 999px;
        padding: 0 16px;
        background: #0ca678;
        color: #fff;
        cursor: pointer;
        font-weight: 800;
      }

      button.secondary {
        background: #343a40;
      }

      button:disabled {
        cursor: not-allowed;
        opacity: 0.55;
      }

      input[type="file"] {
        color: #fffaf0;
      }

      input[type="number"],
      select {
        width: 96px;
        min-height: 34px;
        border: 1px solid rgba(255, 255, 255, 0.16);
        border-radius: 10px;
        padding: 0 10px;
        background: #101514;
        color: #fffaf0;
      }

      .toolbar {
        display: grid;
        grid-template-columns: minmax(260px, 1fr) auto;
        gap: 14px;
        align-items: start;
        margin-bottom: 18px;
      }

      .panel {
        border: 1px solid rgba(255, 255, 255, 0.14);
        border-radius: 14px;
        background: rgba(255, 255, 255, 0.06);
        padding: 14px;
      }

      .controls {
        display: flex;
        flex-wrap: wrap;
        gap: 12px;
        align-items: end;
      }

      .field {
        display: grid;
        gap: 6px;
      }

      .field label,
      .toggle {
        color: #d7d7d7;
        font-size: 12px;
        font-weight: 800;
      }

      .toggle {
        display: inline-flex;
        align-items: center;
        gap: 8px;
        min-height: 34px;
      }

      #status {
        margin-top: 10px;
        color: #c3c3c3;
        font-size: 14px;
      }

      #render-config-info {
        display: grid;
        gap: 10px;
        color: #d8f9ec;
        font-size: 13px;
        line-height: 1.7;
      }

      .notice {
        border: 1px solid rgba(255, 212, 59, 0.45);
        border-radius: 14px;
        background: rgba(255, 212, 59, 0.12);
        color: #fff3bf;
        padding: 10px 14px;
        font-weight: 800;
      }

      .summary {
        border: 1px solid rgba(25, 113, 194, 0.45);
        border-radius: 14px;
        background: rgba(25, 113, 194, 0.12);
        color: #d0ebff;
        padding: 10px 14px;
      }

      code {
        color: #ffd43b;
      }

      #pages {
        display: grid;
        gap: 18px;
      }

      .page {
        overflow: hidden;
        border: 1px solid rgba(255, 255, 255, 0.14);
        border-radius: 18px;
        background: #0e1513;
        padding: 14px;
      }

      .page h2 {
        margin: 0 0 8px;
        font-size: 15px;
      }

      .page-meta {
        margin: 0 0 12px;
        color: #a9b7b2;
        font-size: 12px;
        line-height: 1.7;
      }

      .preview-toolbar {
        display: flex;
        flex-wrap: wrap;
        gap: 8px;
        align-items: center;
        margin: 0 0 10px;
      }

      .preview-toolbar button {
        min-height: 30px;
        padding: 0 12px;
        background: #343a40;
        font-size: 12px;
      }

      .preview-zoom {
        padding: 5px 10px;
        border-radius: 999px;
        background: rgba(255, 255, 255, 0.08);
        color: #d7d7d7;
        font-size: 12px;
        font-weight: 800;
      }

      .slot-review-page {
        position: relative;
        display: flex;
        justify-content: center;
        min-width: 620px;
        max-height: 78vh;
        overflow: auto;
        border-radius: 18px;
        background: #101514;
        padding: 12px;
      }

      .page-badge {
        position: absolute;
        top: 18px;
        left: 18px;
        z-index: 3;
        border-radius: 5px;
        background: #1971c2;
        color: #fff;
        padding: 4px 10px;
        font-size: 12px;
        font-weight: 800;
      }

      .slot-review-canvas-wrap {
        position: relative;
        width: 1020px;
        max-width: none;
      }

      .preview-canvas {
        display: block;
        width: 1020px;
        height: auto;
        border-radius: 12px;
        background: #fff;
        box-shadow: 0 18px 50px rgba(0, 0, 0, 0.32);
        pointer-events: none;
      }

      .page-actions {
        display: flex;
        flex-wrap: wrap;
        gap: 10px;
        margin-top: 12px;
      }

      .page-actions a {
        display: inline-flex;
        align-items: center;
        min-height: 34px;
        border-radius: 999px;
        background: #1971c2;
        color: #fff;
        padding: 0 14px;
        font-size: 12px;
        font-weight: 800;
        text-decoration: none;
      }

      details {
        margin-top: 12px;
      }

      textarea {
        box-sizing: border-box;
        width: 100%;
        min-height: 90px;
        border: 1px solid rgba(255, 255, 255, 0.12);
        border-radius: 10px;
        background: #101010;
        color: #d8f9ec;
      }

      @media (max-width: 860px) {
        body {
          padding: 16px;
        }

        .toolbar {
          grid-template-columns: 1fr;
        }
      }
    </style>
  </head>
  <body>
    <h1>PDF.js 渲染 PDF 到 JPEG V2 测试</h1>
    <div class="toolbar">
      <div class="panel">
        <div class="controls">
          <input id="pdf-file" type="file" accept="application/pdf,.pdf" />
          <div class="field">
            <label for="render-scale">Render Scale</label>
            <input id="render-scale" min="0.5" max="10" step="0.25" type="number" />
          </div>
          <div class="field">
            <label for="jpeg-quality">JPEG Quality</label>
            <input id="jpeg-quality" min="0.1" max="1" step="0.01" type="number" />
          </div>
          <div class="field">
            <label for="max-long-edge">最长边上限</label>
            <input id="max-long-edge" min="0" max="8000" step="100" type="number" />
          </div>
          <label class="toggle">
            <input id="auto-crop" type="checkbox" />
            裁白边
          </label>
          <label class="toggle">
            <input id="auto-rotate" type="checkbox" />
            自动旋转
          </label>
          <label class="toggle">
            <input id="grayscale" type="checkbox" />
            灰度化
          </label>
          <label class="toggle">
            <input id="background-cleanup" type="checkbox" />
            背景白化
          </label>
          <button id="render-button" type="button">上传并渲染 PDF</button>
        </div>
        <div id="status">请选择 PDF 文件。</div>
      </div>
      <div id="render-config-info" class="panel">
        正在读取 .env.local 中的 PDF 渲染配置...
      </div>
    </div>
    <div id="pages"></div>
    <script type="module" src="./pdf-render-test-v2.js?v=20260521-1"></script>
  </body>
</html>
