<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>PDF to PNG Test</title>
    <style>
      body {
        margin: 0;
        padding: 24px;
        background: #181818;
        color: #f7f3e8;
        font-family:
          "Microsoft YaHei",
          "PingFang SC",
          sans-serif;
      }

      .toolbar {
        display: flex;
        flex-wrap: wrap;
        gap: 12px;
        align-items: center;
        margin-bottom: 18px;
      }

      button,
      input {
        border-radius: 999px;
      }

      button {
        border: 0;
        padding: 10px 16px;
        background: #0ca678;
        color: white;
        cursor: pointer;
        font-weight: 700;
      }

      input[type="file"] {
        color: #f7f3e8;
      }

      #status {
        color: #c3c3c3;
        font-size: 14px;
      }

      #pages {
        display: grid;
        gap: 18px;
      }

      .page {
        overflow: auto;
        padding: 14px;
        border: 1px solid rgba(255, 255, 255, 0.14);
        border-radius: 18px;
        background: #0e1513;
      }

      .page h2 {
        margin: 0 0 12px;
        font-size: 14px;
      }

      .crop-info {
        margin: -4px 0 12px;
        color: #a9b7b2;
        font-size: 12px;
      }

      .slot-review-preview {
        position: relative;
        display: flex;
        justify-content: center;
        min-width: 560px;
        max-height: 78vh;
        padding: 14px;
        overflow: auto;
        border-radius: 18px;
        background: #101514;
      }

      .slot-review-preview-toolbar {
        display: flex;
        flex-wrap: wrap;
        gap: 8px;
        align-items: center;
        margin: 0 0 10px;
      }

      .slot-review-preview-toolbar button {
        padding: 7px 12px;
        background: #343a40;
        font-size: 12px;
      }

      .slot-review-preview-zoom {
        padding: 4px 10px;
        border-radius: 999px;
        background: rgba(255, 255, 255, 0.08);
        color: #d7d7d7;
        font-size: 12px;
        font-weight: 700;
      }

      .page-badge {
        position: absolute;
        top: 18px;
        left: 18px;
        z-index: 2;
        padding: 4px 10px;
        border-radius: 5px;
        background: #1971c2;
        color: #fff;
        font-size: 12px;
        font-weight: 800;
      }

      .slot-review-canvas-wrap {
        position: relative;
        min-width: max-content;
      }

      canvas,
      img {
        display: block;
        max-width: 100%;
        height: auto;
        border-radius: 10px;
        background: white;
      }

      .preview-canvas {
        max-width: none;
        image-rendering: auto;
        box-shadow: 0 18px 50px rgba(0, 0, 0, 0.32);
      }

      .page-actions {
        display: flex;
        gap: 10px;
        margin-top: 12px;
      }

      .page-actions a {
        display: inline-flex;
        align-items: center;
        min-height: 34px;
        padding: 0 14px;
        border-radius: 999px;
        background: #1971c2;
        color: #fff;
        font-size: 12px;
        font-weight: 800;
        text-decoration: none;
      }

      .raw-canvas-wrap {
        overflow: auto;
        max-height: 70vh;
        margin-top: 12px;
        padding: 12px;
        border: 1px solid rgba(255, 255, 255, 0.12);
        border-radius: 14px;
        background: #080808;
      }

      .raw-canvas-wrap canvas {
        max-width: none;
      }

      .canvas-toolbar {
        display: flex;
        flex-wrap: wrap;
        gap: 8px;
        align-items: center;
        margin-top: 12px;
      }

      .canvas-toolbar button {
        padding: 7px 12px;
        background: #2b8a6e;
        font-size: 12px;
      }

      .canvas-zoom-label {
        color: #c3c3c3;
        font-size: 13px;
      }

      details {
        margin-top: 12px;
      }

      textarea {
        width: 100%;
        min-height: 90px;
        box-sizing: border-box;
        border-radius: 10px;
        background: #101010;
        color: #d8f9ec;
      }
    </style>
  </head>
  <body>
    <h1>PDF.js 渲染 PDF 到 PNG 测试</h1>
    <div class="toolbar">
      <input id="pdf-file" type="file" accept="application/pdf,.pdf" />
      <button id="render-button" type="button">上传并渲染 PDF</button>
      <span id="status">请选择 PDF 文件。</span>
    </div>
    <div id="pages"></div>
    <script type="module" src="./pdf-render-test.js"></script>
  </body>
</html>
